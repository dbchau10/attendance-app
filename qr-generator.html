<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo mã QR học viên</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
    }

    .header p {
      font-size: 13px;
      opacity: .8;
      margin-top: 6px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 14px;
    }

    select,
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
    }

    select {
      border: 2px solid #5e7eb7;
      margin-bottom: 10px;
    }

    .btn {
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    .btn-dark {
      background: #1a1a2e;
      color: white;
    }

    .btn-green {
      background: #059669;
      color: white;
    }

    #status {
      text-align: center;
      color: #666;
      margin: 10px 0;
    }

    .qr-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .qr-card {
      border: 2px solid #5e7eb7;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .qr-card img {
      display: block;
      margin: auto;
    }

    .qr-name {
      font-size: 14px;
      font-weight: 600;
    }

    .qr-id {
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>Tạo mã QR học viên</h1>
    <p>Chọn lớp → Tạo QR → In ra giấy → Phát cho học viên</p>
  </div>

  <div class="container">

    <div class="card">

      <div class="card-title">Chọn lớp</div>

      <select id="classSelect">
        <option value="">— Đang tải danh sách lớp…</option>
      </select>

      <button id="btnGenerate" class="btn btn-dark" disabled onclick="generateQR()">
        Tạo mã QR
      </button>

      <button id="btnPrint" class="btn btn-green" style="display:none" onclick="window.print()">
        In mã QR
      </button>

    </div>

    <p id="status"></p>

    <div class="card" id="infoCard" style="display:none">
      QR mới chứa mã lớp + mã số → quét là điểm danh,
      <strong>không cần chọn lớp</strong> trên app.
    </div>

    <div class="card" id="outputCard" style="display:none">
      <div class="card-title" id="outputTitle">Mã QR</div>
      <div id="qrGrid" class="qr-grid"></div>
    </div>

  </div>

  <script>

    var API = "https://script.google.com/macros/s/AKfycbyX9tmXzZ1ck8wWA_PINZZB-3VXr3c1JFQHKm4mVMkw10_OYAab38hmH64mOernQDie/exec"

    var classSelect = document.getElementById("classSelect")
    var btnGenerate = document.getElementById("btnGenerate")

    fetch(API + "?action=getClasses")
      .then(r => r.json())
      .then(classes => {

        classSelect.innerHTML = '<option value="">— Chọn lớp —</option>'

        classes.forEach(c => {

          var opt = document.createElement("option")
          opt.value = c.id
          opt.textContent = c.name

          classSelect.appendChild(opt)

        })

      })
      .catch(() => {

        classSelect.innerHTML = '<option value="">Lỗi tải danh sách lớp</option>'

      })

    classSelect.addEventListener("change", function () {

      btnGenerate.disabled = !this.value

      document.getElementById("btnPrint").style.display = "none"
      document.getElementById("qrGrid").innerHTML = ""

      document.getElementById("outputCard").style.display = "none"
      document.getElementById("infoCard").style.display = "none"

      document.getElementById("status").textContent = ""

    })

    function generateQR() {

      var fileId = classSelect.value
      if (!fileId) return

      btnGenerate.disabled = true

      document.getElementById("status").textContent = "Đang tải danh sách học viên..."
      document.getElementById("qrGrid").innerHTML = ""
      document.getElementById("btnPrint").style.display = "none"

      fetch(API + "?action=getStudents&fileId=" + fileId)

        .then(r => r.json())

        .then(students => {

          if (!students || students.length === 0) {

            document.getElementById("status").textContent = "Không có học viên nào."
            btnGenerate.disabled = false
            return

          }

          document.getElementById("status").textContent = "Đang tạo " + students.length + " mã QR..."

          var grid = document.getElementById("qrGrid")

          students.forEach(s => {

            var qrContent = fileId + ":" + s.id

            var card = document.createElement("div")
            card.className = "qr-card"

            var img = document.createElement("img")
            img.width = 150
            img.height = 150

            img.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(qrContent)

            card.appendChild(img)

            var name = document.createElement("div")
            name.className = "qr-name"
            name.textContent = (s.saintName ? s.saintName + " " : "") + s.fullName

            card.appendChild(name)

            var id = document.createElement("div")
            id.className = "qr-id"
            id.textContent = "Mã số: " + s.id

            card.appendChild(id)

            grid.appendChild(card)

          })

          document.getElementById("status").textContent = ""
          document.getElementById("outputTitle").textContent = students.length + " học viên"

          document.getElementById("outputCard").style.display = "block"
          document.getElementById("infoCard").style.display = "block"

          document.getElementById("btnPrint").style.display = "block"

          btnGenerate.disabled = false

        })

        .catch(err => {

          document.getElementById("status").textContent = "Lỗi: " + err.message
          btnGenerate.disabled = false

        })

    }

  </script>

</body>

</html>
